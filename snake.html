<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #4ecca3;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      letter-spacing: 2px;
    }
    #scoreboard span { color: #4ecca3; font-weight: bold; }
    canvas {
      background: #0f3460;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(78,204,163,0.3);
    }
    #message {
      margin-top: 18px;
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 1px;
      min-height: 1.4em;
    }
    #message.highlight { color: #4ecca3; font-size: 1.2rem; }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="scoreboard">
    SCORE: <span id="score">0</span> &nbsp;&nbsp; BEST: <span id="best">0</span>
  </div>
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="message">Press <b>Space</b> or <b>Enter</b> to start</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const COLS = 24, ROWS = 24;
    const CELL = canvas.width / COLS;

    let snake, dir, nextDir, food, score, best, gameState, interval;
    // gameState: 'idle' | 'running' | 'over'

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    function initGame() {
      snake = [
        { x: 12, y: 12 },
        { x: 11, y: 12 },
        { x: 10, y: 12 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      document.getElementById('score').textContent = 0;
      placeFood();
      setMessage('');
      gameState = 'running';
      clearInterval(interval);
      interval = setInterval(tick, 120);
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('score').textContent = score;
        if (score > best) {
          best = score;
          localStorage.setItem('snakeBest', best);
          document.getElementById('best').textContent = best;
        }
        placeFood();
        // Speed up slightly every 5 points
        if (score % 5 === 0) {
          clearInterval(interval);
          const speed = Math.max(60, 120 - score * 3);
          interval = setInterval(tick, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      clearInterval(interval);
      gameState = 'over';
      draw();
      setMessage('Game over! Press Space or Enter to restart', true);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food
      const fx = food.x * CELL, fy = food.y * CELL;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx + CELL / 2, fy + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // Food shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(fx + CELL / 2 - 2, fy + CELL / 2 - 2, CELL / 6, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const r = Math.round(78 + t * 40);
        const g = Math.round(204 - t * 80);
        const b = Math.round(163 - t * 60);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 3);
        ctx.fill();
      });

      // Eyes on head
      const head = snake[0];
      ctx.fillStyle = '#0f3460';
      const ex = head.x * CELL, ey = head.y * CELL;
      const eyeOffset = dir.y !== 0 ? [CELL * 0.25, CELL * 0.75] : [CELL * 0.3, CELL * 0.7];
      const eyeY = dir.y !== 0 ? (dir.y > 0 ? CELL * 0.65 : CELL * 0.35) : CELL * 0.35;
      const eyeX = dir.x !== 0 ? (dir.x > 0 ? CELL * 0.65 : CELL * 0.35) : null;
      if (dir.x !== 0) {
        ctx.beginPath(); ctx.arc(ex + (dir.x > 0 ? CELL * 0.65 : CELL * 0.35), ey + CELL * 0.3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + (dir.x > 0 ? CELL * 0.65 : CELL * 0.35), ey + CELL * 0.7, 2.5, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(ex + CELL * 0.3, ey + (dir.y > 0 ? CELL * 0.65 : CELL * 0.35), 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + CELL * 0.7, ey + (dir.y > 0 ? CELL * 0.65 : CELL * 0.35), 2.5, 0, Math.PI * 2); ctx.fill();
      }

      // Overlay on game over
      if (gameState === 'over') {
        ctx.fillStyle = 'rgba(15,52,96,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4ecca3';
        ctx.font = `bold ${CELL * 1.5}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - CELL);
        ctx.fillStyle = '#eee';
        ctx.font = `${CELL * 0.8}px Courier New`;
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + CELL * 0.5);
      }
    }

    function setMessage(text, highlight = false) {
      const el = document.getElementById('message');
      el.innerHTML = text || 'Press <b>Space</b> or <b>Enter</b> to start';
      el.className = highlight ? 'highlight' : '';
    }

    // Initial idle screen
    gameState = 'idle';
    (() => {
      // Draw a static snake on the board for the start screen
      snake = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
      food = {x:15,y:12};
      dir = {x:1,y:0};
      draw();
    })();

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (gameState !== 'running') initGame();
        return;
      }
      if (gameState !== 'running') return;
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y === 0) nextDir = {x:0,y:-1}; e.preventDefault(); break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y === 0) nextDir = {x:0,y:1};  e.preventDefault(); break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x === 0) nextDir = {x:-1,y:0}; e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x === 0) nextDir = {x:1,y:0};  e.preventDefault(); break;
      }
    });
  </script>
</body>
</html>
